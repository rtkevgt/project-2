<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ángela López · Estudio Lash Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
<div id="root"></div>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink:        #F0AABF;
    --pink-deep:   #D4789A;
    --pink-light:  #F8C8D8;
    --pink-pale:   #FDF4F7;
    --gold:        #D4AF7A;
    --gold-light:  #EDD9A3;
    --gold-deep:   #B8923A;
    --pearl:       #FDFAF5;
    --blush:       #FDF4F7;
    --blush-mid:   #FAE8EF;
    --charcoal:    #2A1F1A;
    --ink:         #3D2B22;
    --ink-soft:    #7A5C46;
    --ink-muted:   #A88B6E;
    --white:       #FFFFFF;
    --border:      #FAE8EF;
    --danger:      #C47090;
    --radius-sm:   8px;
    --radius-md:   14px;
    --radius-lg:   22px;
    --radius-xl:   32px;
    --shadow-sm:   0 2px 14px rgba(212,120,154,.10);
    --shadow-md:   0 8px 32px rgba(212,120,154,.14);
    --shadow-lg:   0 20px 60px rgba(212,120,154,.16);
  }

  html { font-size: 15px; scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--pearl);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--blush-mid); border-radius: 99px; }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(160deg, #FAE8EF 0%, #FDF4F7 40%, #FFF9EE 100%);
    padding: 72px 24px 56px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(240,170,191,.28) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -40px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(212,175,122,.20) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; }

  .hero-monogram {
    font-family: 'Dancing Script', cursive;
    font-size: 64px;
    color: var(--pink-deep);
    line-height: 1;
    text-shadow: 0 2px 16px rgba(212,120,154,.25);
    margin-bottom: 4px;
  }

  .hero-swash {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), transparent);
    margin: 6px auto 16px;
    border-radius: 99px;
  }

  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .hero-studio {
    font-size: 10.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-deep);
    font-weight: 600;
    margin-bottom: 24px;
  }

  .hero-tagline {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    font-style: italic;
    color: var(--charcoal);
    line-height: 1.35;
    margin-bottom: 10px;
  }

  .hero-sub {
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 380px;
    margin: 0 auto 32px;
  }

  .hero-cta-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 24px; border-radius: var(--radius-md); border: none;
    background: linear-gradient(135deg, var(--pink-deep), var(--pink));
    color: #fff; font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease;
    box-shadow: 0 4px 16px rgba(212,120,154,.30); white-space: nowrap;
    text-decoration: none;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,120,154,.38); }

  .btn-gold {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 24px; border-radius: var(--radius-md); border: none;
    background: linear-gradient(135deg, var(--gold-deep), var(--gold));
    color: #fff; font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease;
    box-shadow: 0 4px 16px rgba(184,146,58,.28); white-space: nowrap;
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(184,146,58,.36); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 22px; border-radius: var(--radius-md);
    border: 1.5px solid var(--border); background: transparent;
    color: var(--ink-soft); font-family: 'Inter', sans-serif;
    font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .2s ease;
  }
  .btn-ghost:hover { border-color: var(--pink-light); color: var(--pink-deep); background: var(--blush); }

  .btn-sm {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--pink-deep), var(--pink));
    color: #fff; font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease; white-space: nowrap;
    box-shadow: 0 3px 10px rgba(212,120,154,.25);
  }
  .btn-sm:hover { transform: translateY(-1px); }

  .btn-sm-gold {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--gold-deep), var(--gold));
    color: #fff; font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease; white-space: nowrap;
  }

  .btn-danger {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm); border: none;
    background: var(--danger); color: #fff;
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease;
  }

  /* ── NAV CATEGORIES ── */
  .cats-nav {
    background: var(--white);
    border-bottom: 1.5px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 12px rgba(212,120,154,.06);
  }

  .cats-nav-inner {
    display: flex; gap: 4px; overflow-x: auto;
    padding: 12px 20px; scrollbar-width: none;
    max-width: 1100px; margin: 0 auto;
  }
  .cats-nav-inner::-webkit-scrollbar { display: none; }

  .cat-pill {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 18px; border-radius: 99px; border: 1.5px solid var(--border);
    background: transparent; color: var(--ink-soft);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .18s ease; white-space: nowrap;
    flex-shrink: 0;
  }
  .cat-pill:hover { border-color: var(--pink-light); color: var(--pink-deep); background: var(--blush); }
  .cat-pill.active { background: var(--pink-deep); border-color: var(--pink-deep); color: #fff; font-weight: 600; }

  /* ── MAIN LAYOUT ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 48px 20px 80px; }

  .section-eyebrow {
    font-size: 10.5px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--gold-deep); margin-bottom: 6px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 700; color: var(--charcoal);
    margin-bottom: 6px;
  }

  .gold-line {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 99px; margin-bottom: 32px;
  }

  /* ── SERVICE GRID ── */
  .service-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .service-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: all .22s ease;
    cursor: pointer;
  }
  .service-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--pink-light); }

  .service-photo {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    background: linear-gradient(135deg, var(--blush), var(--blush-mid));
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; position: relative; overflow: hidden;
  }

  .service-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .service-photo-placeholder {
    width: 100%; aspect-ratio: 4/3;
    background: linear-gradient(135deg, var(--blush) 0%, var(--blush-mid) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px;
  }

  .service-photo-placeholder span { font-size: 36px; opacity: .5; }
  .service-photo-placeholder p { font-size: 11.5px; color: var(--ink-muted); font-style: italic; }

  .service-cat-badge {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 99px;
    padding: 4px 12px; font-size: 11px; font-weight: 600;
    color: var(--pink-deep); letter-spacing: .3px;
  }

  .service-body { padding: 20px 22px 22px; }

  .service-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700; color: var(--charcoal);
    margin-bottom: 6px; line-height: 1.25;
  }

  .service-desc {
    font-size: 13px; color: var(--ink-soft); line-height: 1.65;
    margin-bottom: 14px;
  }

  .service-meta {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }

  .service-duration {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-muted); font-weight: 500;
  }

  .service-price {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700;
    color: var(--gold-deep);
    background: linear-gradient(135deg, #FFF6E0, #FFF0C8);
    border: 1px solid var(--gold-light);
    padding: 4px 14px; border-radius: 99px;
  }

  .service-benefits {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
  }

  .benefit-tag {
    font-size: 11px; font-weight: 600; color: var(--pink-deep);
    background: var(--blush); border: 1px solid var(--pink-light);
    padding: 3px 10px; border-radius: 99px;
  }

  /* ── GALLERY STRIP ── */
  .gallery-strip {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none; margin-top: 12px;
  }
  .gallery-strip::-webkit-scrollbar { display: none; }

  .gallery-thumb {
    width: 64px; height: 64px; flex-shrink: 0;
    border-radius: var(--radius-sm); overflow: hidden;
    border: 1.5px solid var(--border); cursor: pointer;
    transition: transform .18s;
  }
  .gallery-thumb:hover { transform: scale(1.06); }
  .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── SERVICE MODAL (detalle) ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(42,31,26,.5);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 200;
    animation: fadeIn .18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-card {
    background: var(--pearl); border-radius: var(--radius-xl);
    width: 100%; max-width: 540px; max-height: 92vh;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg); overflow: hidden;
    animation: slideUp .24s cubic-bezier(.22,.68,0,1.2);
    border: 1.5px solid var(--border);
  }

  .modal-card.wide { max-width: 680px; }

  .modal-img {
    width: 100%; aspect-ratio: 16/9; object-fit: cover;
    background: linear-gradient(135deg, var(--blush), var(--blush-mid));
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; flex-shrink: 0;
  }

  .modal-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .modal-body { padding: 28px 30px; overflow-y: auto; flex: 1; }
  .modal-actions { padding: 16px 30px 24px; border-top: 1.5px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }

  .modal-close-btn {
    position: absolute; top: 14px; right: 14px;
    width: 34px; height: 34px; border-radius: 50%;
    border: none; background: rgba(255,255,255,.88);
    color: var(--ink-soft); display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(8px); transition: all .18s;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .modal-close-btn:hover { color: var(--pink-deep); background: #fff; }

  /* ── SHARE PANEL ── */
  .share-panel {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 28px;
    box-shadow: var(--shadow-sm); margin-top: 40px;
  }

  .share-qr-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; padding: 24px;
    background: var(--blush); border-radius: var(--radius-md);
    border: 1.5px solid var(--border);
  }

  .share-qr-wrap canvas { border-radius: 8px; }

  /* ── ADMIN ── */
  .admin-bar {
    background: linear-gradient(135deg, var(--pink-deep), var(--pink));
    color: #fff; padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }

  .admin-bar-label { font-size: 12.5px; font-weight: 600; letter-spacing: .5px; display: flex; align-items: center; gap: 8px; }

  .admin-panel {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 28px;
    box-shadow: var(--shadow-sm); margin-bottom: 32px;
  }

  .admin-services-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

  .admin-service-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--pearl); border: 1.5px solid var(--border);
    border-radius: var(--radius-md); padding: 12px 16px;
    transition: box-shadow .18s;
  }
  .admin-service-row:hover { box-shadow: var(--shadow-sm); }

  .admin-row-thumb {
    width: 48px; height: 48px; border-radius: var(--radius-sm);
    overflow: hidden; flex-shrink: 0; background: var(--blush);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    border: 1px solid var(--border);
  }
  .admin-row-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field-full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11.5px; font-weight: 600; color: var(--ink-soft); letter-spacing: .3px; }

  .input-field {
    padding: 11px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); font-family: 'Inter', sans-serif;
    font-size: 13.5px; color: var(--ink); background: var(--white);
    outline: none; transition: border-color .18s, box-shadow .18s; width: 100%;
  }
  .input-field:focus { border-color: var(--pink-light); box-shadow: 0 0 0 3px rgba(240,170,191,.15); }
  .input-field::placeholder { color: var(--ink-muted); }
  textarea.input-field { min-height: 80px; resize: vertical; }

  /* ── LOGIN ── */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #FAE8EF 0%, #FDF4F7 50%, #FFF9EE 100%);
    padding: 20px;
  }

  .login-card {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius-xl); padding: 48px 40px;
    max-width: 380px; width: 100%; text-align: center;
    box-shadow: var(--shadow-lg);
    animation: slideUp .3s cubic-bezier(.22,.68,0,1.2);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 64px 24px;
    border: 1.5px dashed var(--border); border-radius: var(--radius-xl);
    gap: 10px; background: var(--white);
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(42,31,26,.9);
    display: flex; align-items: center; justify-content: center;
    z-index: 400; padding: 20px;
    animation: fadeIn .18s ease;
  }

  .lightbox img {
    max-width: 90vw; max-height: 88vh;
    border-radius: 12px; object-fit: contain;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--charcoal); color: #fff; padding: 12px 24px;
    border-radius: 99px; font-size: 13.5px; font-weight: 600;
    z-index: 500; white-space: nowrap;
    box-shadow: 0 8px 28px rgba(42,31,26,.28);
    animation: toastIn .25s cubic-bezier(.22,.68,0,1.2);
    border: 1px solid rgba(255,255,255,.08);
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── WHATSAPP BTN ── */
  .wa-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 22px; border-radius: var(--radius-md); border: none;
    background: #25D366; color: #fff;
    font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease; text-decoration: none;
    box-shadow: 0 4px 14px rgba(37,211,102,.28);
  }
  .wa-btn:hover { background: #20BA5C; transform: translateY(-1px); }

  /* ── FOOTER ── */
  .footer {
    text-align: center; padding: 28px 20px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--ink-muted);
  }

  .footer-monogram {
    font-family: 'Dancing Script', cursive;
    font-size: 26px; color: var(--pink-deep);
    display: block; margin-bottom: 6px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .hero-tagline { font-size: 22px; }
    .hero-monogram { font-size: 52px; }
    .service-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .modal-card { max-height: 96vh; border-radius: var(--radius-xl) var(--radius-xl) 0 0; }
    .modal-overlay { align-items: flex-end; padding: 0; }
    .login-card { padding: 36px 24px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }

  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--pink-light); outline-offset: 2px;
  }
</style>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ── STORAGE ── */
const SK = {
  SERVICES: "lash:catalog:services",
  PHOTOS:   "lash:catalog:photos:",
};

function sGet(k, fb) { try { const r = localStorage.getItem(k); return r === null ? fb : JSON.parse(r); } catch { return fb; } }
function sSet(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch(e) { return e.name === "QuotaExceededError" ? "quota" : false; } }

/* ── CONSTANTES ── */
const ADMIN_PASS = "angela2025";  // ← Contraseña del panel de administración

const CATEGORIES = [
  { id: "pestanas",   label: "Extensión de pestañas", icon: "👁️" },
  { id: "lifting",    label: "Lifting de pestañas",   icon: "✨" },
  { id: "laminado",   label: "Laminado de cejas",     icon: "🌿" },
  { id: "depilacion", label: "Depilación",             icon: "🌸" },
  { id: "unas",       label: "Uñas",                  icon: "💅" },
  { id: "otro",       label: "Otro servicio",          icon: "⭐" },
];

const DEFAULT_SERVICES = [

/* ── SVG ICONS ── */
const Ico = ({ n, s = 18 }) => {
  const p = { width: s, height: s, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (n) {
    case "x":       return <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case "plus":    return <svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    case "check":   return <svg {...p}><polyline points="20 6 9 17 4 12"/></svg>;
    case "edit":    return <svg {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>;
    case "trash":   return <svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1.5 14a2 2 0 0 1-2 1.8H8.5a2 2 0 0 1-2-1.8L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>;
    case "share":   return <svg {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>;
    case "clock":   return <svg {...p}><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>;
    case "lock":    return <svg {...p}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    case "image":   return <svg {...p}><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5-4 4-2-2-5 5"/></svg>;
    case "camera":  return <svg {...p}><path d="M4 8h3l1.5-2.5h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13.5" r="3.5"/></svg>;
    case "qr":      return <svg {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>;
    case "eye":     return <svg {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
    case "wa":      return <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>;
    case "logout":  return <svg {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
    case "settings":return <svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    default: return null;
  }
};

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App() {
  const [services, setServices]     = useState([]);
  const [adminMode, setAdminMode]   = useState(false);
  const [showLogin, setShowLogin]   = useState(false);
  const [activeCat, setActiveCat]   = useState("all");
  const [detail, setDetail]         = useState(null);
  const [lightbox, setLightbox]     = useState(null);
  const [showShare, setShowShare]   = useState(false);
  const [toast, setToast]           = useState(null);
  const [loading, setLoading]       = useState(true);

  useEffect(() => {
    const saved = sGet(SK.SERVICES, null);
    setServices(saved || DEFAULT_SERVICES);
    setLoading(false);
  }, []);

  const showToast = useCallback(msg => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }, []);

  const persist = useCallback(next => {
    const r = sSet(SK.SERVICES, next);
    if (r === "quota") showToast("⚠️ Sin espacio disponible.");
    setServices(next);
  }, [showToast]);

  const photosFor = useCallback(id => sGet(SK.PHOTOS + id, []), []);

  const savePhotos = useCallback((id, photos) => {
    const r = sSet(SK.PHOTOS + id, photos);
    if (r === "quota") showToast("⚠️ Sin espacio para fotos.");
  }, [showToast]);

  const filtered = useMemo(() =>
    activeCat === "all" ? services : services.filter(s => s.categoria === activeCat),
  [services, activeCat]);

  const usedCats = useMemo(() => {
    const used = new Set(services.map(s => s.categoria));
    return CATEGORIES.filter(c => used.has(c.id));
  }, [services]);

  if (loading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background:"linear-gradient(160deg,#FAE8EF,#FDF4F7,#FFF9EE)", flexDirection:"column", gap:14 }}>
      <div style={{ fontFamily:"'Dancing Script',cursive", fontSize:56, color:"var(--pink-deep)", textShadow:"0 2px 14px rgba(212,120,154,.25)" }}>AL</div>
      <p style={{ fontFamily:"'Playfair Display',serif", fontSize:14, color:"var(--ink-soft)", letterSpacing:2, textTransform:"uppercase" }}>Cargando catálogo…</p>
    </div>
  );

  return (
    <>
      {/* ADMIN BAR */}
      {adminMode && (
        <div className="admin-bar">
          <span className="admin-bar-label"><Ico n="settings" s={15}/> Modo administrador activo</span>
          <div style={{ display:"flex", gap:10 }}>
            <button className="btn-sm" style={{ background:"rgba(255,255,255,.2)", boxShadow:"none" }} onClick={() => setShowShare(true)}><Ico n="qr" s={13}/> Compartir catálogo</button>
            <button className="btn-sm" style={{ background:"rgba(255,255,255,.15)", boxShadow:"none" }} onClick={() => setAdminMode(false)}><Ico n="logout" s={13}/> Salir</button>
          </div>
        </div>
      )}

      {/* HERO */}
      <section className="hero">
        <div className="hero-inner">
          <div className="hero-monogram">AL</div>
          <div className="hero-swash"/>
          <div className="hero-name">Ángela López</div>
          <div className="hero-studio">Estudio Lash Designer</div>
          <h1 className="hero-tagline">Realza tu mirada,<br/>expresa tu esencia.</h1>
          <p className="hero-sub">Servicios de extensión de pestañas, lifting, laminado de cejas y tratamientos estéticos con la más alta calidad.</p>
          <div className="hero-cta-row">
            <a href="https://wa.me/56921951379" className="wa-btn" target="_blank" rel="noopener noreferrer"><Ico n="wa" s={17}/> Reservar cita</a>
            <button className="btn-ghost" onClick={() => setShowShare(true)}><Ico n="share" s={15}/> Compartir catálogo</button>
          </div>
        </div>
      </section>

      {/* CATEGORY NAV */}
      {usedCats.length > 1 && (
        <nav className="cats-nav">
          <div className="cats-nav-inner">
            <button className={`cat-pill${activeCat === "all" ? " active" : ""}`} onClick={() => setActiveCat("all")}>
              🌸 Todos los servicios
            </button>
            {usedCats.map(c => (
              <button key={c.id} className={`cat-pill${activeCat === c.id ? " active" : ""}`} onClick={() => setActiveCat(c.id)}>
                {c.icon} {c.label}
              </button>
            ))}
          </div>
        </nav>
      )}

      {/* MAIN CATALOG */}
      <main className="main">

        {/* ADMIN PANEL */}
        {adminMode && (
          <AdminPanel
            services={services}
            onPersist={persist}
            photosFor={photosFor}
            savePhotos={savePhotos}
            showToast={showToast}
          />
        )}

        {/* CATALOG HEADER */}
        <div style={{ marginBottom: 32 }}>
          <p className="section-eyebrow">Nuestros servicios</p>
          <h2 className="section-title">
            {activeCat === "all" ? "Catálogo completo" : catLabel(activeCat)}
          </h2>
          <div className="gold-line"/>
        </div>

        {/* SERVICE GRID */}
        {filtered.length === 0 ? (
          <div className="empty-state">
            <span style={{ fontSize:36, opacity:.4 }}>🌸</span>
            <p style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:600, color:"var(--ink)" }}>
              {services.length === 0 ? "Aún no hay servicios en el catálogo" : "Sin servicios en esta categoría"}
            </p>
            <p style={{ fontSize:13.5, color:"var(--ink-muted)" }}>
              {adminMode ? "Agrega el primer servicio desde el panel de administración." : "Pronto habrá novedades."}
            </p>
          </div>
        ) : (
          <div className="service-grid">
            {filtered.map(svc => (
              <ServiceCard
                key={svc.id}
                service={svc}
                photos={photosFor(svc.id)}
                onClick={() => setDetail({ service: svc, photos: photosFor(svc.id) })}
                adminMode={adminMode}
              />
            ))}
          </div>
        )}

        {/* SHARE SECTION (público) */}
        {!adminMode && (
          <ShareSection showToast={showToast} />
        )}
      </main>

      {/* FOOTER */}
      <footer className="footer">
        <span className="footer-monogram">AL</span>
        <p>© {new Date().getFullYear()} Ángela López · Estudio Lash Designer</p>
        <p style={{ marginTop:6, color:"var(--ink-muted)" }}>
          {!adminMode
            ? <button style={{ background:"none", border:"none", color:"var(--ink-muted)", fontSize:11.5, cursor:"pointer", textDecoration:"underline" }} onClick={() => setShowLogin(true)}>Acceso administrador</button>
            : null}
        </p>
      </footer>

      {/* MODALS */}
      {detail && (
        <ServiceDetail
          service={detail.service}
          photos={detail.photos}
          onClose={() => setDetail(null)}
          onLightbox={setLightbox}
        />
      )}

      {showShare && <ShareModal onClose={() => setShowShare(false)} showToast={showToast} />}

      {showLogin && !adminMode && (
        <LoginModal
          onClose={() => setShowLogin(false)}
          onSuccess={() => { setAdminMode(true); setShowLogin(false); showToast("✨ Bienvenida, Ángela"); }}
        />
      )}

      {lightbox && (
        <div className="lightbox" onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="Vista ampliada" onClick={e => e.stopPropagation()} />
          <button style={{ position:"absolute", top:20, right:20, width:38, height:38, borderRadius:"50%", border:"none", background:"rgba(255,255,255,.15)", color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={() => setLightbox(null)}><Ico n="x" s={16}/></button>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

/* ══════════════════════════════════════
   SERVICE CARD
══════════════════════════════════════ */
function ServiceCard({ service: svc, photos, onClick, adminMode }) {
  const mainPhoto = photos[0];
  return (
    <div className="service-card" onClick={onClick}>
      {/* PHOTO */}
      <div style={{ position:"relative" }}>
        {mainPhoto ? (
          <div className="service-photo">
            <img src={mainPhoto.dataUrl} alt={svc.nombre} />

          <div className="service-photo-placeholder">
            <span>{catIcon(svc.categoria)}</span>

              <div key={p.id} className="gallery-thumb" onClick={e => { e.stopPropagation(); }}>
                <img src={p.dataUrl} alt="" />
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

   ADMIN PANEL
══════════════════════════════════════ */
function AdminPanel({ services, onPersist, photosFor, savePhotos, showToast }) {
  const [showForm, setShowForm]     = useState(false);
  const [editing, setEditing]       = useState(null);
  const [editPhotos, setEditPhotos] = useState(null); // { serviceId, photos }
  const [confirmDel, setConfirmDel] = useState(null);

  const emptyForm = () => ({
    id: uid(), categoria:"pestanas", nombre:"", descripcion:"",
    duracion:60, precio:"", mostrarPrecio:false, beneficios:[""]
  });

  const handleSave = (form) => {
    const clean = {
      ...form,
      duracion: parseInt(form.duracion) || 60,
      precio: form.precio ? String(form.precio) : null,
      beneficios: form.beneficios.filter(b => b.trim()),
    };
    const next = editing
      ? services.map(s => s.id === editing.id ? clean : s)
      : [clean, ...services];
    onPersist(next);
    setShowForm(false);
    setEditing(null);
    showToast(editing ? "Servicio actualizado ✨" : "Servicio agregado ✨");
  };

  const handleDelete = id => {
    onPersist(services.filter(s => s.id !== id));
    setConfirmDel(null);
    showToast("Servicio eliminado");
  };

  return (
    <div className="admin-panel">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12, marginBottom:6 }}>
        <div>
          <p style={{ fontSize:10, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:"var(--gold-deep)", marginBottom:4 }}>Panel de administración</p>
          <h3 style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, color:"var(--charcoal)" }}>Gestionar servicios</h3>
        </div>
        <button className="btn-sm" onClick={() => { setEditing(null); setShowForm(true); }}><Ico n="plus" s={14}/> Nuevo servicio</button>
      </div>

      <div className="admin-services-list">
        {services.length === 0 && <p style={{ fontSize:13.5, color:"var(--ink-muted)", textAlign:"center", padding:"20px 0" }}>Sin servicios aún. Crea el primero.</p>}
        {services.map(svc => {
          const photos = photosFor(svc.id);
          return (
            <div key={svc.id} className="admin-service-row">
              <div className="admin-row-thumb">
                {photos[0] ? <img src={photos[0].dataUrl} alt="" /> : <span>{catIcon(svc.categoria)}</span>}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontWeight:700, fontSize:14, color:"var(--charcoal)" }}>{svc.nombre}</div>
                <div style={{ fontSize:12, color:"var(--ink-muted)", marginTop:2 }}>{catLabel(svc.categoria)} · {svc.duracion} min {svc.mostrarPrecio && svc.precio ? `· $${svc.precio}` : "· Precio oculto"}</div>
              </div>
              <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                <button className="btn-sm-gold" onClick={() => setEditPhotos({ serviceId: svc.id, photos: photosFor(svc.id) })}><Ico n="camera" s={13}/></button>
                <button className="btn-sm" style={{ background:"rgba(212,120,154,.15)", boxShadow:"none", color:"var(--pink-deep)" }} onClick={() => { setEditing(svc); setShowForm(true); }}><Ico n="edit" s={13}/></button>
                <button className="btn-danger" onClick={() => setConfirmDel(svc.id)}><Ico n="trash" s={13}/></button>
              </div>
            </div>
          );
        })}
      </div>

      {/* FORM MODAL */}
      {showForm && (
        <ServiceFormModal
          initial={editing || emptyForm()}
          onClose={() => { setShowForm(false); setEditing(null); }}
          onSave={handleSave}
        />
      )}

      {/* PHOTOS MODAL */}
      {editPhotos && (
        <PhotosModal
          serviceId={editPhotos.serviceId}
          initialPhotos={editPhotos.photos}
          onClose={() => setEditPhotos(null)}
          onSave={(id, photos) => { savePhotos(id, photos); setEditPhotos(null); showToast("Fotos guardadas ✨"); }}
          showToast={showToast}
        />
      )}

      {/* CONFIRM DELETE */}
      {confirmDel && (
        <div className="modal-overlay" onClick={() => setConfirmDel(null)}>
          <div className="modal-card" style={{ maxWidth:380 }} onClick={e => e.stopPropagation()}>
            <div style={{ padding:"24px 28px" }}>
              <h3 style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:700, marginBottom:12 }}>¿Eliminar este servicio?</h3>
              <p style={{ fontSize:14, color:"var(--ink-soft)", lineHeight:1.6, marginBottom:20 }}>Esta acción no se puede deshacer. Las fotos del servicio también se eliminarán.</p>
              <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
                <button className="btn-ghost" onClick={() => setConfirmDel(null)}>Cancelar</button>
                <button className="btn-danger" style={{ padding:"12px 20px", borderRadius:"var(--radius-md)", fontSize:13.5 }} onClick={() => handleDelete(confirmDel)}><Ico n="trash" s={14}/> Eliminar</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   SERVICE FORM MODAL
══════════════════════════════════════ */
function ServiceFormModal({ initial, onClose, onSave }) {
  const [form, setForm] = useState({ ...initial, beneficios: initial.beneficios?.length ? [...initial.beneficios] : [""] });
  const set = k => e => setForm(p => ({ ...p, [k]: e.target.type === "checkbox" ? e.target.checked : e.target.value }));

  const setBeneficio = (i, val) => {
    const b = [...form.beneficios];
    b[i] = val;
    setForm(p => ({ ...p, beneficios: b }));
  };
  const addBeneficio = () => setForm(p => ({ ...p, beneficios: [...p.beneficios, ""] }));
  const removeBeneficio = i => setForm(p => ({ ...p, beneficios: p.beneficios.filter((_, idx) => idx !== i) }));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card wide" onClick={e => e.stopPropagation()}>
        <div style={{ padding:"22px 28px", borderBottom:"1.5px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, color:"var(--charcoal)" }}>
            {initial.nombre ? "Editar servicio" : "Nuevo servicio"}
          </h2>
          <button style={{ width:34, height:34, borderRadius:"var(--radius-sm)", border:"1.5px solid var(--border)", background:"var(--white)", color:"var(--ink-soft)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }} onClick={onClose}><Ico n="x" s={15}/></button>
        </div>
        <div style={{ padding:"24px 28px", overflowY:"auto", flex:1, display:"flex", flexDirection:"column", gap:16 }}>
          <div className="form-grid">
            <div className="field field-full">
              <label className="field-label">Nombre del servicio *</label>
              <input className="input-field" value={form.nombre} onChange={set("nombre")} placeholder="Ej. Volumen Ruso Premium" autoFocus />
            </div>
            <div className="field">
              <label className="field-label">Categoría</label>
              <select className="input-field" value={form.categoria} onChange={set("categoria")}>
                {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
              </select>
            </div>
            <div className="field">
              <label className="field-label">Duración (minutos)</label>
              <input type="number" className="input-field" value={form.duracion} onChange={set("duracion")} min="10" placeholder="Ej. 90" />
            </div>
            <div className="field field-full">
              <label className="field-label">Descripción</label>
              <textarea className="input-field" value={form.descripcion} onChange={set("descripcion")} placeholder="Describe el servicio, la técnica y los resultados esperados…" />
            </div>

            {/* PRECIO */}
            <div className="field">
              <label className="field-label">Precio (opcional)</label>
              <input type="number" className="input-field" value={form.precio || ""} onChange={set("precio")} placeholder="Ej. 35" min="0" />
            </div>
            <div className="field" style={{ justifyContent:"flex-end" }}>
              <label style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", padding:"11px 14px", background:"var(--blush)", borderRadius:"var(--radius-sm)", border:"1.5px solid var(--border)" }}>
                <input type="checkbox" checked={form.mostrarPrecio} onChange={set("mostrarPrecio")} style={{ accentColor:"var(--pink-deep)", width:15, height:15 }} />
                <span style={{ fontSize:13, color:"var(--ink)", fontWeight:500 }}>Mostrar precio en el catálogo</span>
              </label>
            </div>
          </div>

          {/* BENEFICIOS */}
          <div>
            <p className="field-label" style={{ marginBottom:8 }}>Beneficios / puntos clave (opcionales)</p>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {form.beneficios.map((b, i) => (
                <div key={i} style={{ display:"flex", gap:8 }}>
                  <input className="input-field" value={b} onChange={e => setBeneficio(i, e.target.value)} placeholder={`Ej. Dura 3–4 semanas`} style={{ flex:1 }} />
                  {form.beneficios.length > 1 && (
                    <button style={{ width:38, border:"1.5px solid var(--border)", borderRadius:"var(--radius-sm)", background:"transparent", color:"var(--ink-muted)", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={() => removeBeneficio(i)}><Ico n="x" s={14}/></button>
                  )}
                </div>
              ))}
              <button style={{ alignSelf:"flex-start", background:"none", border:"1.5px dashed var(--border)", padding:"7px 14px", borderRadius:"var(--radius-sm)", color:"var(--ink-muted)", fontSize:12.5, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }} onClick={addBeneficio}><Ico n="plus" s={13}/> Añadir beneficio</button>
            </div>
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" style={{ opacity: form.nombre.trim() ? 1 : .5 }} disabled={!form.nombre.trim()} onClick={() => onSave(form)}>
            <Ico n="check" s={15}/> {initial.nombre ? "Guardar cambios" : "Crear servicio"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PHOTOS MODAL
══════════════════════════════════════ */
function PhotosModal({ serviceId, initialPhotos, onClose, onSave, showToast }) {
  const [photos, setPhotos] = useState([...initialPhotos]);
  const fileRef = useRef(null);

  const handleFiles = files => {
    const arr = Array.from(files).filter(f => f.type.startsWith("image/"));
    if (!arr.length) return;
    let loaded = 0;
    arr.forEach(file => {
      const r = new FileReader();
      r.onload = e => {
        const newP = { id: uid("f"), dataUrl: e.target.result, fecha: localDate() };
        setPhotos(prev => {
          if (++loaded === arr.length) { }
          return [...prev, newP];
        });
      };
      r.readAsDataURL(file);
    });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card wide" onClick={e => e.stopPropagation()}>
        <div style={{ padding:"22px 28px", borderBottom:"1.5px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700 }}>Fotos del servicio</h2>
          <button style={{ width:34, height:34, borderRadius:"var(--radius-sm)", border:"1.5px solid var(--border)", background:"var(--white)", color:"var(--ink-soft)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }} onClick={onClose}><Ico n="x" s={15}/></button>
        </div>
        <div style={{ padding:"24px 28px", overflowY:"auto", flex:1 }}>
          <div style={{ display:"flex", gap:10, marginBottom:18 }}>
            <button className="btn-sm" onClick={() => fileRef.current?.click()}><Ico n="image" s={14}/> Subir fotos</button>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{ display:"none" }} onChange={e => { if (e.target.files?.length) { handleFiles(e.target.files); e.target.value = ""; }}} />
          </div>
          {photos.length === 0 ? (
            <div className="empty-state" style={{ padding:"40px 20px" }}>
              <span style={{ fontSize:28, opacity:.4 }}>📷</span>
              <p style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:600, color:"var(--ink)" }}>Sin fotos aún</p>
              <p style={{ fontSize:13, color:"var(--ink-muted)" }}>Sube fotos para mostrar los resultados de este servicio.</p>
            </div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(120px,1fr))", gap:10 }}>
              {photos.map(p => (
                <div key={p.id} style={{ position:"relative", aspectRatio:"1", borderRadius:"var(--radius-md)", overflow:"hidden", border:"1.5px solid var(--border)" }}>
                  <img src={p.dataUrl} alt="" style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
                  <button style={{ position:"absolute", top:6, right:6, width:26, height:26, borderRadius:8, border:"none", background:"rgba(180,60,90,.82)", color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={() => setPhotos(prev => prev.filter(x => x.id !== p.id))}><Ico n="x" s={12}/></button>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="modal-actions">
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={() => onSave(serviceId, photos)}><Ico n="check" s={15}/> Guardar fotos</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   SHARE MODAL (QR + enlace)
══════════════════════════════════════ */
function ShareModal({ onClose, showToast }) {
  const url = window.location.href.split("?")[0];
  const [qrError, setQrError] = useState(false);
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=10&color=3D2B22&bgcolor=FFFFFF&data=${encodeURIComponent(url)}`;

  const copyLink = () => {
    navigator.clipboard.writeText(url).then(() => showToast("🔗 Enlace copiado")).catch(() => showToast("No se pudo copiar"));
  };

  const waShare = () => {
    window.open(`https://wa.me/?text=${encodeURIComponent("¡Mira el catálogo de Ángela López · Estudio Lash Designer!\n" + url)}`, "_blank");
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card" style={{ maxWidth:420 }} onClick={e => e.stopPropagation()}>
        <div style={{ padding:"22px 28px", borderBottom:"1.5px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700 }}>Compartir catálogo</h2>
          <button style={{ width:34, height:34, borderRadius:"var(--radius-sm)", border:"1.5px solid var(--border)", background:"var(--white)", color:"var(--ink-soft)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }} onClick={onClose}><Ico n="x" s={15}/></button>
        </div>
        <div style={{ padding:"24px 28px", display:"flex", flexDirection:"column", gap:20 }}>
          {/* QR */}
          <div className="share-qr-wrap">
            {!qrError ? (
              <img
                src={qrSrc}
                alt="Código QR del catálogo"
                width={200}
                height={200}
                style={{ borderRadius:8, background:"#fff", display:"block" }}
                onError={() => setQrError(true)}
              />
            ) : (
              <div style={{ width:200, height:200, display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center", fontSize:12, color:"var(--ink-muted)", background:"#fff", borderRadius:8, padding:12 }}>
                No se pudo generar el QR. Verifica tu conexión a internet.
              </div>
            )}
            <p style={{ fontSize:12, color:"var(--ink-muted)", textAlign:"center" }}>Escanea para abrir el catálogo</p>
          </div>

          {/* ENLACE */}
          <div>
            <p style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-soft)", marginBottom:8 }}>Enlace directo</p>
            <div style={{ display:"flex", gap:8 }}>
              <input readOnly className="input-field" value={url} style={{ flex:1, fontSize:12, color:"var(--ink-soft)" }} />
              <button className="btn-sm" onClick={copyLink}><Ico n="check" s={13}/> Copiar</button>
            </div>
          </div>

          {/* SHARE BUTTONS */}
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            <button className="wa-btn" style={{ flex:1, justifyContent:"center" }} onClick={waShare}>
              <Ico n="wa" s={16}/> Enviar por WhatsApp
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   SHARE SECTION (pública, dentro del catálogo)
══════════════════════════════════════ */
function ShareSection({ showToast }) {
  return (
    <div className="share-panel" style={{ textAlign:"center", marginTop:56 }}>
      <div style={{ fontFamily:"'Dancing Script',cursive", fontSize:32, color:"var(--pink-deep)", marginBottom:8 }}>AL</div>
      <h3 style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, color:"var(--charcoal)", marginBottom:8 }}>¿Te encantó algún servicio?</h3>
      <p style={{ fontSize:13.5, color:"var(--ink-soft)", marginBottom:22, lineHeight:1.6, maxWidth:380, margin:"0 auto 22px" }}>Comparte este catálogo con tus amigas o escríbeme directamente para reservar tu cita.</p>
      <div style={{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap" }}>
        <a href="https://wa.me/56921951379" className="wa-btn" target="_blank" rel="noopener noreferrer"><Ico n="wa" s={17}/> Reservar cita</a>
        <button className="btn-gold" onClick={() => { const url = window.location.href; navigator.clipboard.writeText(url).then(() => showToast("🔗 Enlace copiado")); }}><Ico n="share" s={15}/> Compartir catálogo</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   LOGIN MODAL
══════════════════════════════════════ */
function LoginModal({ onClose, onSuccess }) {
  const [pass, setPass]     = useState("");
  const [error, setError]   = useState(false);
  const [shake, setShake]   = useState(false);

  const tryLogin = () => {
    if (pass === ADMIN_PASS) { onSuccess(); }
    else {
      setError(true); setShake(true);
      setTimeout(() => setShake(false), 500);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div style={{ animation: shake ? "shake .4s ease" : "none" }} onClick={e => e.stopPropagation()}>
        <style>{`@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }`}</style>
        <div className="login-card">
          <div style={{ fontFamily:"'Dancing Script',cursive", fontSize:48, color:"var(--pink-deep)", marginBottom:4, textShadow:"0 2px 12px rgba(212,120,154,.22)" }}>AL</div>
          <div style={{ width:50, height:2, background:"linear-gradient(90deg,transparent,var(--gold),transparent)", margin:"6px auto 16px", borderRadius:99 }}/>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, color:"var(--charcoal)", marginBottom:6 }}>Acceso administrador</h2>
          <p style={{ fontSize:13, color:"var(--ink-muted)", marginBottom:24, lineHeight:1.5 }}>Ingresa tu contraseña para gestionar el catálogo.</p>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <input
              type="password"
              className="input-field"
              placeholder="Contraseña"
              value={pass}
              onChange={e => { setPass(e.target.value); setError(false); }}
              onKeyDown={e => e.key === "Enter" && tryLogin()}
              autoFocus
              style={error ? { borderColor:"var(--danger)", boxShadow:"0 0 0 3px rgba(196,112,144,.15)" } : {}}
            />
            {error && <p style={{ fontSize:12.5, color:"var(--danger)", textAlign:"center" }}>Contraseña incorrecta. Intenta de nuevo.</p>}
            <button className="btn-primary" style={{ justifyContent:"center" }} onClick={tryLogin}>
              <Ico n="lock" s={15}/> Entrar al panel
            </button>
            <button className="btn-ghost" style={{ justifyContent:"center" }} onClick={onClose}>Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
